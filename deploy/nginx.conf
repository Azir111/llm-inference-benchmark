events {}

http {
    upstream vllm_round_robin {
        server localhost:8000;
        server localhost:8001;
        server localhost:8002;
    }

    upstream vllm_least_conn {
        least_conn;
        server localhost:8000;
        server localhost:8001;
        server localhost:8002;
    }

    server {
        listen 9090;
        location /v1/ {
            proxy_pass http://vllm_round_robin;
            proxy_read_timeout 300s;
        }
    }

    server {
        listen 9091;
        location /v1/ {
            proxy_pass http://vllm_least_conn;
            proxy_read_timeout 300s;
        }
    }
}
